name: Build Kernel r45b2 with WildKSU (SukiSU-Ultra) and SUSFS

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y make ccache clang flex bison llvm lld libssl-dev bc lz4 fakeroot cpio patch pigz python3

      - name: Checkout arter97 r45b2 (Base Kernel)
        uses: actions/checkout@v4
        with:
          repository: arter97/android_kernel_nothing_sm8475
          ref: r45b2
          path: kernel

      - name: Checkout kareefardi fork (For KSU/SUSFS scripts and patches)
        uses: actions/checkout@v4
        with:
          repository: kareefardi/android_kernel_nothing_sm8475_fork
          ref: master
          path: fork
          submodules: true

      - name: Copy KSU/SUSFS Integration Files into kernel tree
        working-directory: kernel
        run: |
          # Copy the SukiSU-Ultra (WildKSU) source into the kernel tree
          cp -r ../fork/KernelSU .
          cp -r ../fork/susfs4ksu .
          cp -r ../fork/kernel_patches .
          cp -r ../fork/mkbootimg .
          cp ../fork/build_kernel.sh .
          cp ../fork/ramdisk_fix_permissions.sh .
          
          # Copy SUSFS source files into the kernel tree
          cp ../fork/fs/susfs.c fs/
          cp ../fork/include/linux/susfs.h include/linux/
          cp ../fork/fs/sus_su fs/ || true
          
          # Ensure scripts are executable
          chmod +x *.sh

      - name: Remove hardcoded toolchain paths from Makefile
        working-directory: kernel
        run: |
          sed -i 's|override CROSS_COMPILE.*||g' Makefile
          sed -i 's|override LLVM_PATH.*||g' Makefile

      - name: Apply KSU hooks patch
        working-directory: kernel
        continue-on-error: true
        run: |
          echo "=== Applying KSU hooks (next_hooks.patch) ==="
          patch -p1 --forward < kernel_patches/next/next_hooks.patch
          echo "=== KSU hooks applied successfully ==="

      - name: Apply SUSFS kernel integration patch
        working-directory: kernel
        continue-on-error: true
        run: |
          echo "=== Applying SUSFS GKI android13-5.10 integration patch ==="
          patch -p1 --forward < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.10.patch
          echo "=== SUSFS integration patch applied successfully ==="

      - name: Apply SUSFS support into KernelSU (SukiSU-Ultra)
        working-directory: kernel
        continue-on-error: true
        run: |
          echo "=== Enabling SUSFS inside SukiSU-Ultra ==="
          patch -d KernelSU -p1 --forward < susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
          echo "=== SUSFS enabled in SukiSU-Ultra ==="

      - name: Apply WildKernels SUSFS fix patches
        working-directory: kernel
        continue-on-error: true
        run: |
          echo "=== Applying WildKernels SUSFS fix patches for v1.5.9 ==="
          patch -d KernelSU -p0 --forward < kernel_patches/wild/susfs_fix_patches/v1.5.9/fix_apk_sign.c.patch
          patch -d KernelSU -p0 --forward < kernel_patches/wild/susfs_fix_patches/v1.5.9/fix_core_hook.c.patch
          patch -d KernelSU -p0 --forward < kernel_patches/wild/susfs_fix_patches/v1.5.9/fix_kernel_compat.c.patch
          patch -d KernelSU -p1 --forward < kernel_patches/wild/susfs_fix_patches/v1.5.9/fix_sucompat.c.patch
          echo "=== All SUSFS fix patches applied ==="

      - name: Fix KernelSU min kernel version for 5.10
        working-directory: kernel
        run: |
          sed -i 's/KERNEL_VERSION(6, 4, 0)/KERNEL_VERSION(5, 10, 0)/' KernelSU/kernel/selinux/rules.c

      - name: Inject KSU/SUSFS configs into defconfig
        working-directory: kernel
        run: |
          cat << 'EOF' >> defconfig
          # KernelSU (SukiSU-Ultra / WildKSU)
          CONFIG_KSU=y
          # CONFIG_KSU_DEBUG is not set
          CONFIG_KSU_ALLOWLIST_WORKAROUND=n
          CONFIG_KSU_LSM_SECURITY_HOOKS=y
          # KernelSU - SUSFS
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_OVERLAY_FS=y
          CONFIG_OVERLAY_FS_REDIRECT_ALWAYS_FOLLOW=y
          EOF

      - name: Verify patch integration before build
        working-directory: kernel
        run: |
          echo "=== Checking KernelSU Kconfig exists ==="
          cat KernelSU/kernel/Kconfig | head -5
          echo "=== Checking SUSFS source files exist ==="
          ls -la fs/susfs.c
          ls -la include/linux/susfs.h
          echo "=== Checking KSU configs in defconfig ==="
          grep "CONFIG_KSU" defconfig
          echo "=== Checking kernel/Kconfig sources KernelSU ==="
          grep -r "KernelSU" kernel/Kconfig
          echo "=== Checking fs/Makefile has susfs ==="
          grep -i "susfs" fs/Makefile
          echo "=== All integration checks passed ==="

      - name: Build Kernel
        working-directory: kernel
        run: ./build_kernel.sh

      - name: Verify KernelSU is built into boot image
        working-directory: kernel
        run: |
          echo "=== Verifying CONFIG_KSU in final .config ==="
          grep '^CONFIG_KSU=y$' .config
          echo "=== Verifying KSU symbols in System.map ==="
          grep -E ' ksu_| kernelsu' System.map | head -10
          echo "=== Build verification passed ==="

      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-image-r45b2-wildksu-susfs
          path: kernel/boot.img
